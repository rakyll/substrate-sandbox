name: release

# Tagging vX.Y.Z publishes the three deployment images (digest-pinned),
# rewrites the README quickstart's deploy command with the new image
# references, and creates a GitHub release whose notes list the images.
# No binaries are built; users install ssbx with `go install` and copy the
# pinned deploy command from the README.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: ko-build/setup-ko@v0.9

      - name: Log in to ghcr.io
        run: echo "${{ github.token }}" | ko login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Publish ssbx-guest image
        id: guest
        run: |
          image=$(KO_DOCKER_REPO=ghcr.io/${GITHUB_REPOSITORY@L}/ssbx-guest ko build --bare ./cmd/ssbx-guest)
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Publish ssbx-api image
        id: api
        run: |
          image=$(KO_DOCKER_REPO=ghcr.io/${GITHUB_REPOSITORY@L}/ssbx-api ko build --bare ./cmd/ssbx-api)
          echo "image=$image" >> "$GITHUB_OUTPUT"

      # ateom-gvisor lives in the Substrate repo; build it at the commit
      # pinned in go.mod so the worker matches the client libraries.
      - name: Publish ateom-gvisor image
        id: ateom
        run: |
          version=$(go list -m -f '{{.Version}}' github.com/agent-substrate/substrate)
          commit=${version##*-}
          git clone --filter=blob:none https://github.com/agent-substrate/substrate "$RUNNER_TEMP/substrate"
          git -C "$RUNNER_TEMP/substrate" checkout "$commit"
          cd "$RUNNER_TEMP/substrate"
          image=$(KO_DOCKER_REPO=ghcr.io/${GITHUB_REPOSITORY@L}/ateom-gvisor ko build --bare ./cmd/ateom-gvisor)
          echo "image=$image" >> "$GITHUB_OUTPUT"

      # Rewrite the deploy command between the release-deploy markers in the
      # README with the images published above, and push to the default
      # branch.
      - name: Update README with released images
        env:
          GUEST_IMAGE: ${{ steps.guest.outputs.image }}
          API_IMAGE: ${{ steps.api.outputs.image }}
          ATEOM_IMAGE: ${{ steps.ateom.outputs.image }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main

          cat > "$RUNNER_TEMP/deploy-block" <<EOF
          <!-- release-deploy:begin (rewritten by the release workflow; do not edit) -->
          \`\`\`bash
          # Images are pinned by release $GITHUB_REF_NAME.
          ssbx deploy \\
            --guest-image $GUEST_IMAGE \\
            --api-image   $API_IMAGE \\
            --ateom-image $ATEOM_IMAGE \\
            --snapshots-bucket gs://<your-bucket>/substrate-sandbox/ | kubectl apply -f -
          \`\`\`
          <!-- release-deploy:end -->
          EOF

          awk -v blockfile="$RUNNER_TEMP/deploy-block" '
            /<!-- release-deploy:begin/ {
              skip = 1
              while ((getline line < blockfile) > 0) print line
              next
            }
            /<!-- release-deploy:end -->/ { skip = 0; next }
            !skip
          ' README.md > README.md.new
          mv README.md.new README.md

          git commit -am "docs: pin $GITHUB_REF_NAME release images in README"
          git push origin main

      # Create the release, or update its notes if it already exists (e.g.
      # when the release was created in the GitHub UI, whose tag push is
      # what triggered this workflow).
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes="Images published by this release:
          - \`${{ steps.guest.outputs.image }}\`
          - \`${{ steps.api.outputs.image }}\`
          - \`${{ steps.ateom.outputs.image }}\`

          Deploy with \`ssbx deploy\`; the README quickstart carries the full pinned command."
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            existing=$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json body -q .body)
            printf '%s\n\n%s\n' "$existing" "$notes" | gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --notes-file -
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              --notes "$notes"
          fi
