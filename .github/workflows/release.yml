name: release

# Tagging vX.Y.Z publishes the two deployment images (digest-pinned) and a
# GitHub release with ssbx/substrate-sandbox binaries that have those
# image references baked in, so `ssbx deploy` works without ko.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: ko-build/setup-ko@v0.9

      - name: Log in to ghcr.io
        run: echo "${{ github.token }}" | ko login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Publish substrate-sandbox-guest image
        id: guest
        run: |
          image=$(KO_DOCKER_REPO=ghcr.io/${GITHUB_REPOSITORY@L}/substrate-sandbox-guest ko build --bare ./cmd/substrate-sandbox-guest)
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Publish substrate-sandbox image
        id: api
        run: |
          image=$(KO_DOCKER_REPO=ghcr.io/${GITHUB_REPOSITORY@L}/substrate-sandbox ko build --bare ./cmd/substrate-sandbox)
          echo "image=$image" >> "$GITHUB_OUTPUT"

      # ateom-gvisor lives in the Substrate repo; build it at the commit
      # pinned in go.mod so the worker matches the client libraries.
      - name: Publish ateom-gvisor image
        id: ateom
        run: |
          version=$(go list -m -f '{{.Version}}' github.com/agent-substrate/substrate)
          commit=${version##*-}
          git clone --filter=blob:none https://github.com/agent-substrate/substrate "$RUNNER_TEMP/substrate"
          git -C "$RUNNER_TEMP/substrate" checkout "$commit"
          cd "$RUNNER_TEMP/substrate"
          image=$(KO_DOCKER_REPO=ghcr.io/${GITHUB_REPOSITORY@L}/ateom-gvisor ko build --bare ./cmd/ateom-gvisor)
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          GUEST_IMAGE: ${{ steps.guest.outputs.image }}
          ATEOM_IMAGE: ${{ steps.ateom.outputs.image }}
          API_IMAGE: ${{ steps.api.outputs.image }}
        run: |
          mkdir -p dist
          for os in linux darwin; do
            for arch in amd64 arm64; do
              GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -trimpath \
                -ldflags "-s -w -X main.defaultGuestImage=$GUEST_IMAGE -X main.defaultAteomImage=$ATEOM_IMAGE -X main.defaultAPIImage=$API_IMAGE" \
                -o "dist/ssbx-$os-$arch" ./cmd/ssbx
              GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" \
                -o "dist/substrate-sandbox-$os-$arch" ./cmd/substrate-sandbox
            done
          done

      # Create the release, or add the assets to it if it already exists
      # (e.g. when the release was created in the GitHub UI, whose tag push
      # is what triggered this workflow).
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes="Default deploy images baked into ssbx:
          - \`${{ steps.guest.outputs.image }}\`
          - \`${{ steps.ateom.outputs.image }}\`
          - \`${{ steps.api.outputs.image }}\`"
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber --repo "$GITHUB_REPOSITORY"
            existing=$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json body -q .body)
            printf '%s\n\n%s\n' "$existing" "$notes" | gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --notes-file -
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              --notes "$notes"
          fi
